<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Received - Elevate Creators Agency</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            padding: 40px;
            border-radius: 12px;
            background: #0d0d0d;
            border: 1px solid #1a1a1a;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            max-width: 500px;
        }
        h1 {
            color: #ffffff;
            font-size: 28px;
            margin-bottom: 16px;
        }
        .accent {
            color: #ffc72c;
        }
        p {
            color: #a0a0ab;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .btn {
            display: inline-block;
            background-color: #ffc72c;
            color: #000000;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 6px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 14px;
            transition: background-color 0.2s;
        }
        .btn:hover {
            background-color: #e0ae24;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Application <span class="accent">Received</span></h1>
        <p>Thank you for applying to Elevate Creators Agency. Our team is reviewing your details, and we will be in touch with you shortly via email if it's a good fit.</p>
        <a href="https://elevatecreatorsagency.com" class="btn">Return Home</a>
    </div>

</body>
</html>
